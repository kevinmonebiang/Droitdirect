name: camrlex
description: Application Flutter camerounaise de reservation de services juridiques.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  go_router: ^17.1.0
  dio: ^5.9.2
  flutter_svg: ^2.2.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.10.0
  firebase_messaging: ^16.1.2
  image_picker: ^1.2.1
  file_picker: ^10.3.10
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.12.2
  freezed: ^3.2.5
  json_serializable: ^6.13.0

flutter:
  uses-material-design: true
  assets:
    - assets/branding/droitdirect_logo.svg
    - assets/branding/droitdirect_mark.svg
    - assets/branding/droitdirect_logo_premium.png
    - assets/branding/droitdirect_mark_premium.png
    - assets/branding/droitdirect_app_icon_1024.png
    - assets/branding/logo.png
    - web/favicon.png
    - web/icons/Icon-192.png
    - web/icons/Icon-512.png
    - web/icons/Icon-maskable-192.png
    - web/icons/Icon-maskable-512.png
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
          weight: 400
        - asset: assets/fonts/Roboto-Medium.ttf
          weight: 500
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
        - asset: assets/fonts/Roboto-Black.ttf
          weight: 900
